---
name: docs

"on":
  push:
    branches:
      - develop
      - main
      - feature-stac-api
    paths:
      # Only rebuild website when docs have changed
      - 'docs/**'
      - 'mkdocs.yml'
      - .github/workflows/docs.yaml
      - cwl-workflow/app-*.cwl
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            mkdocs-material \
            mkdocs-mermaid2-plugin \
            mkdocs-jupyter \
            odc-stac \
            ipykernel \
            cwltool \
            zarr \
            matplotlib \
            graphviz \
            pillow \
            "cwl-loader>=0.5.0" \
            eoap-cwlwrap \
            plantuml \
            "cwl2puml>=0.8.0"

      - name: Install OS dependencies
        run: sudo apt-get update && sudo apt-get install -y graphviz wget

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io \
                -u "${{ github.actor }}" \
                --password-stdin

      - name: Pull workflow images and deploy docs
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            app_image_tag="latest"
          elif [ "${GITHUB_REF_NAME}" = "develop" ]; then
            app_image_tag="latest-dev"
          else
            app_image_tag="latest-dev"
          fi
          echo "Resolved app image tag: ${app_image_tag}"

          for step in \
            crop \
            norm_diff \
            otsu \
            stac-zarr \
            stac-collection \
            stac-eopf-product
          do
            tag="ghcr.io/eoap/zarr-cloud-native-format/${step}:${app_image_tag}"
            fallback_tag="ghcr.io/eoap/zarr-cloud-native-format/${step}:latest"

            echo "Pulling ${tag}"
            if ! docker pull "${tag}"; then
              if [ -n "${fallback_tag}" ]; then
                echo "Tag not found, falling back to ${fallback_tag}"
                docker pull "${fallback_tag}"
              else
                exit 1
              fi
            fi
          done

          mkdocs gh-deploy --force
