version: "3"

tasks:
  containers:build:stac-collection:
    desc: Build stac-collection:latest image
    cmds:
      - docker build -t stac-collection:latest command-line-tools/stac-collection

  containers:build:stac-zarr:
    desc: Build stac-zarr:latest image
    cmds:
      - docker build -t stac-zarr:latest command-line-tools/stac-zarr

  containers:build:stac-eopf-product:
    desc: Build stac-eopf-product:latest image
    cmds:
      - docker build -t stac-eopf-product:latest command-line-tools/stac-eopf-product

  containers:build:occurrence:
    desc: Build occurrence:latest image
    cmds:
      - docker build -t occurrence:latest command-line-tools/occurrence

  containers:build:crop:
    desc: Build crop:latest image
    cmds:
      - docker build -t crop:latest command-line-tools/crop

  containers:build:norm-diff:
    desc: Build norm-diff:latest image
    cmds:
      - docker build -t norm-diff:latest command-line-tools/norm_diff

  containers:build:otsu:
    desc: Build otsu:latest image
    cmds:
      - docker build -t otsu:latest command-line-tools/otsu

  containers:build:producer:
    desc: Build all local images required by app-water-bodies.cwl local tools
    deps:
      - task: containers:build:crop
      - task: containers:build:norm-diff
      - task: containers:build:otsu
      - task: containers:build:stac-collection
      - task: containers:build:stac-zarr
      - task: containers:build:stac-eopf-product

  containers:build:all:
    desc: Build all local workflow images
    deps:
      - task: containers:build:producer
      - task: containers:build:occurrence

  cwl:run:producer:
    desc: Run producer workflow against Microsoft Planetary Computer STAC API
    cmds:
      - |
        uv run --with cwltool cwltool \
          cwl-workflow/app-water-bodies.cwl#water-bodies \
          cwl-tests/jobs/producer-job.yml \
          > cwl-tests/results.json

  cwl:test:e2e:
    desc: Run end-to-end CWL tests with cwltest
    cmds:
      - |
        uv run --with cwltest --with cwltool cwltest \
          --test tests/app-water-bodies-e2e.yml \
          --basedir cwl-tests \
          --tool cwltool \
          --timeout 3600

  cwl:check:codemeta:
    desc: Validate CWL metadata with transpiler-mate codemeta
    cmds:
      - uv run --with transpiler-mate transpiler-mate codemeta cwl-workflow/app-water-bodies.cwl
      #- uv run --with transpiler-mate transpiler-mate codemeta cwl-workflow/app-water-bodies-occurrence.cwl

  cwl:check:ogc:
    desc: Validate CWL OGC transpilation with cwl2ogc
    cmds:
      - uv run --with cwl2ogc cwl2ogc --workflow-id water-bodies cwl-workflow/app-water-bodies.cwl
      #- uv run --with cwl2ogc cwl2ogc --workflow-id water-bodies-occurrence cwl-workflow/app-water-bodies-occurrence.cwl

  cwl:check:release:
    desc: Run release-oriented CWL checks (codemeta + OGC)
    deps:
      - task: cwl:check:codemeta
      - task: cwl:check:ogc

  compliance:check:multiscales:
    desc: Validate multiscales metadata against upstream zarr-conventions schema (compatibility report)
    cmds:
      - |
        cd command-line-tools/stac-zarr && \
        uv run --with jsonschema --with-editable . \
        python ../../scripts/validate_multiscales_schema.py

  compliance:check:multiscales-layout:
    desc: Validate GeoZarr v1 multiscales layout profile used by this repository
    cmds:
      - |
        cd command-line-tools/stac-zarr && \
        uv run --with-editable . \
        python ../../scripts/validate_multiscales_layout_profile.py

  compliance:check:geo-proj:
    desc: Validate geo-proj metadata against zarr-conventions schema
    cmds:
      - |
        cd command-line-tools/stac-zarr && \
        uv run --with jsonschema --with-editable . \
        python ../../scripts/validate_geo_proj_schema.py

  compliance:check:spatial:
    desc: Validate spatial metadata against zarr-conventions schema
    cmds:
      - |
        cd command-line-tools/stac-zarr && \
        uv run --with jsonschema --with-editable . \
        python ../../scripts/validate_spatial_schema.py

  compliance:check:eopf-explorer:
    desc: Validate EOPF Explorer-style GeoZarr profile compatibility
    cmds:
      - |
        cd command-line-tools/stac-zarr && \
        uv run --with-editable . \
        python ../../scripts/validate_eopf_explorer_profile.py

  compliance:check:all:
    desc: Run strict local profile checks and upstream compatibility report
    deps:
      - task: compliance:check:multiscales-layout
      - task: compliance:check:geo-proj
      - task: compliance:check:spatial
      - task: compliance:check:eopf-explorer
      - task: compliance:check:multiscales

  models:generate:spatial:
    desc: Regenerate Pydantic model from zarr-conventions spatial JSON Schema
    cmds:
      - |
        cd command-line-tools/stac-zarr && \
        uv run --with "datamodel-code-generator[http]" datamodel-codegen \
          --url {{.SPATIAL_SCHEMA_URL}} \
          --input-file-type jsonschema \
          --output-model-type pydantic_v2.BaseModel \
          --base-class stac_zarr.models.base.GeoZarrBaseModel \
          --snake-case-field \
          --output stac_zarr/models/generated/spatial.py
    vars:
      SPATIAL_SCHEMA_URL: '{{default "https://raw.githubusercontent.com/zarr-conventions/spatial/main/schema.json" .SPATIAL_SCHEMA_URL}}'

  models:generate:geo-proj:
    desc: Regenerate Pydantic model from zarr-conventions geo-proj JSON Schema
    cmds:
      - |
        cd command-line-tools/stac-zarr && \
        uv run --with "datamodel-code-generator[http]" datamodel-codegen \
          --url {{.GEO_PROJ_SCHEMA_URL}} \
          --input-file-type jsonschema \
          --output-model-type pydantic_v2.BaseModel \
          --base-class stac_zarr.models.base.GeoZarrBaseModel \
          --snake-case-field \
          --output stac_zarr/models/generated/geo_proj/
    vars:
      GEO_PROJ_SCHEMA_URL: '{{default "https://raw.githubusercontent.com/zarr-conventions/geo-proj/main/schema.json" .GEO_PROJ_SCHEMA_URL}}'

  models:generate:multiscales:
    desc: Regenerate Pydantic model from zarr-conventions multiscales JSON Schema
    cmds:
      - |
        cd command-line-tools/stac-zarr && \
        uv run --with "datamodel-code-generator[http]" datamodel-codegen \
          --url {{.MULTISCALES_SCHEMA_URL}} \
          --input-file-type jsonschema \
          --output-model-type pydantic_v2.BaseModel \
          --base-class stac_zarr.models.base.GeoZarrBaseModel \
          --snake-case-field \
          --output stac_zarr/models/generated/multiscales.py
    vars:
      MULTISCALES_SCHEMA_URL: '{{default "https://raw.githubusercontent.com/zarr-conventions/multiscales/main/schema.json" .MULTISCALES_SCHEMA_URL}}'

  models:generate:all:
    desc: Regenerate all schema-derived Pydantic models used by stac-zarr
    deps:
      - task: models:generate:spatial
      - task: models:generate:geo-proj
      - task: models:generate:multiscales

  docs:serve:
    desc: Serve MkDocs locally
    cmds:
      - |
        uv run \
          --with mkdocs \
          --with mkdocs-material \
          --with mkdocs-mermaid2-plugin \
          --with mkdocs-jupyter \
          --with pymdown-extensions \
          mkdocs serve

  docs:generate:uml:
    desc: Generate UML documentation
    cmds:
    - defer: rm -f docs/ml4floods/*.puml
    - |
      uv run --no-cache --with "transpiler-mate>=0.31.0" transpiler-mate markdown --workflow-id water-bodies --output docs/design --code-repository $(git remote get-url origin) cwl-workflow/app-water-bodies.cwl
      uv run --with cwl2puml cwl2puml --workflow-id water-bodies --output docs/design/water-bodies --convert-image --image-format svg cwl-workflow/app-water-bodies.cwl
      uv run --with cwl2puml cwl2puml --workflow-id detect_water_body --output docs/design/detect_water_body --convert-image --image-format svg cwl-workflow/app-water-bodies.cwl
      rm -f docs/design/water-bodies/*.puml
      rm -f docs/design/detect_water_body/*.puml

  titiler:eopf:run:
    desc: Run titiler-eopf locally against a mounted data root
    cmds:
      - |
        docker run --rm -it \
          -p {{.TITILER_PORT}}:80 \
          -e TITILER_EOPF_STORE_URL=file:///data/ \
          -v {{.DATA_ROOT}}:/data \
          {{.TITILER_IMAGE}}
    vars:
      TITILER_PORT: '{{default "8080" .TITILER_PORT}}'
      DATA_ROOT: '{{default "." .DATA_ROOT}}'
      TITILER_IMAGE: '{{default "ghcr.io/eopf-explorer/titiler-eopf:main" .TITILER_IMAGE}}'

  titiler:eopf:build:patched:
    desc: Build a patched TiTiler-EOPF image with sel-time fixes
    cmds:
      - |
        docker build \
          -f docker/titiler-eopf-patched/Dockerfile \
          -t titiler-eopf:patched \
          .

  titiler:eopf:run:patched:
    desc: Run patched TiTiler-EOPF locally against a mounted data root
    cmds:
      - |
        task titiler:eopf:run DATA_ROOT={{.DATA_ROOT}} TITILER_PORT={{.TITILER_PORT}} TITILER_IMAGE=titiler-eopf:patched
    vars:
      TITILER_PORT: '{{default "8080" .TITILER_PORT}}'
      DATA_ROOT: '{{default "." .DATA_ROOT}}'

  titiler:eopf:run:results:
    desc: Run titiler-eopf using zarr_stac_catalog path from CWL results.json
    cmds:
      - |
        set -euo pipefail
        DATA_ROOT=$(python - <<'PY'
        import json
        from pathlib import Path
        from urllib.parse import urlparse

        results = Path("{{.RESULTS_FILE}}")
        payload = json.loads(results.read_text())
        zarr_catalog = payload.get("zarr_stac_catalog", {})
        location = zarr_catalog.get("location") or zarr_catalog.get("path")
        if not location:
            raise SystemExit("results.json missing zarr_stac_catalog.location/path")
        if isinstance(location, str) and location.startswith("file://"):
            location = urlparse(location).path
        print(location)
        PY
        )

        if [ ! -d "$DATA_ROOT" ]; then
          echo "Resolved DATA_ROOT does not exist: $DATA_ROOT"
          exit 1
        fi

        echo "Using DATA_ROOT=$DATA_ROOT"
        docker run --rm -it \
          -p {{.TITILER_PORT}}:80 \
          -e TITILER_EOPF_STORE_URL=file:///data/ \
          -v "$DATA_ROOT":/data \
          {{.TITILER_IMAGE}}
    vars:
      TITILER_PORT: '{{default "8080" .TITILER_PORT}}'
      RESULTS_FILE: '{{default "cwl-tests/results.json" .RESULTS_FILE}}'
      TITILER_IMAGE: '{{default "ghcr.io/eopf-explorer/titiler-eopf:main" .TITILER_IMAGE}}'

  titiler:eopf:run:results:patched:
    desc: Run patched TiTiler-EOPF using zarr_stac_catalog path from CWL results.json
    cmds:
      - |
        task titiler:eopf:run:results RESULTS_FILE={{.RESULTS_FILE}} TITILER_PORT={{.TITILER_PORT}} TITILER_IMAGE=titiler-eopf:patched
    vars:
      TITILER_PORT: '{{default "8080" .TITILER_PORT}}'
      RESULTS_FILE: '{{default "cwl-tests/results.json" .RESULTS_FILE}}'

  examples:serve:
    desc: Serve repository files over HTTP (for examples/titiler-eopf-client.html)
    cmds:
      - |
        echo "Open http://127.0.0.1:{{.EXAMPLES_PORT}}/examples/titiler-eopf-client.html"
        python -m http.server {{.EXAMPLES_PORT}}
    vars:
      EXAMPLES_PORT: '{{default "8090" .EXAMPLES_PORT}}'

  titiler:eopf:smoke:
    desc: Smoke test titiler-eopf dataset endpoint (requires running titiler:eopf:run)
    cmds:
      - |
        curl -fsSL \
          "http://127.0.0.1:{{.TITILER_PORT}}/collections/{{.COLLECTION_ID}}/items/{{.ITEM_ID}}/dataset" \
          | head -c 400 && echo
    vars:
      TITILER_PORT: '{{default "8080" .TITILER_PORT}}'
      COLLECTION_ID: '{{default "water-bodies" .COLLECTION_ID}}'
      ITEM_ID: '{{default "water-bodies" .ITEM_ID}}'

  titiler:eopf:smoke:sample:
    desc: One-shot smoke test against local sample artifact (auto start/stop container)
    cmds:
      - |
        set -euo pipefail
        CID=$(docker run -d \
          -p {{.TITILER_PORT}}:80 \
          -e TITILER_EOPF_STORE_URL=file:///data/ \
          -v "$(pwd)/{{.DATA_ROOT}}":/data \
          {{.TITILER_IMAGE}})
        cleanup() { docker rm -f "$CID" >/dev/null 2>&1 || true; }
        trap cleanup EXIT
        sleep 4
        curl -fsSL \
          "http://127.0.0.1:{{.TITILER_PORT}}/collections/{{.COLLECTION_ID}}/items/{{.ITEM_ID}}/dataset" \
          | head -c 400 && echo
    vars:
      TITILER_PORT: '{{default "8080" .TITILER_PORT}}'
      DATA_ROOT: '{{default "command-line-tools/stac-zarr" .DATA_ROOT}}'
      COLLECTION_ID: '{{default "water-bodies" .COLLECTION_ID}}'
      ITEM_ID: '{{default "water-bodies" .ITEM_ID}}'
      TITILER_IMAGE: '{{default "ghcr.io/eopf-explorer/titiler-eopf:main" .TITILER_IMAGE}}'

  test:stac-collection:
    desc: Run scoped unit tests for stac-collection
    cmds:
      - |
        cd command-line-tools/stac-collection && \
        uv run --with pytest --with-editable . pytest -q tests

  test:stac-zarr:
    desc: Run scoped unit tests for stac-zarr
    cmds:
      - |
        cd command-line-tools/stac-zarr && \
        uv run --with pytest --with-editable . pytest -q tests

  test:stac-eopf-product:
    desc: Run scoped unit tests for stac-eopf-product
    cmds:
      - |
        cd command-line-tools/stac-eopf-product && \
        uv run --with pytest --with-editable . pytest -q tests

  test:crop:
    desc: Run scoped unit tests for crop
    cmds:
      - |
        cd command-line-tools/crop && \
        uv run --with pytest --with-editable . pytest -q tests

  test:norm-diff:
    desc: Run scoped unit tests for norm-diff
    cmds:
      - |
        cd command-line-tools/norm_diff && \
        uv run --with pytest --with-editable . pytest -q tests

  test:otsu:
    desc: Run scoped unit tests for otsu
    cmds:
      - |
        cd command-line-tools/otsu && \
        uv run --with pytest --with-editable . pytest -q tests

  test:unit:scoped:
    desc: Run all scoped unit test suites
    deps:
      - task: test:stac-collection
      - task: test:stac-zarr
      - task: test:stac-eopf-product
      - task: test:crop
      - task: test:norm-diff
      - task: test:otsu
