name: unit-tests

on:
  pull_request:
    paths:
      - "command-line-tools/**"
      - ".github/workflows/unit-tests.yaml"
      - "Taskfile.yml"
      - "uv.lock"
      - "**/pyproject.toml"
      - "**/uv.lock"
  push:
    branches:
      - develop
      - main
    paths:
      - "command-line-tools/**"
      - ".github/workflows/unit-tests.yaml"
      - "Taskfile.yml"
      - "uv.lock"
      - "**/pyproject.toml"
      - "**/uv.lock"
  workflow_dispatch:

jobs:
  scoped-unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package-dir:
          - command-line-tools/stac-zarr
          - command-line-tools/stac-collection
          - command-line-tools/stac-eopf-product
          - command-line-tools/crop
          - command-line-tools/norm_diff
          - command-line-tools/otsu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Run unit tests
        working-directory: ${{ matrix.package-dir }}
        run: uv run --with pytest --with-editable . pytest -q tests

  multiscales-layout-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Validate GeoZarr v1 multiscales layout profile
        run: task compliance:check:multiscales-layout

  multiscales-upstream-compatibility:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Validate upstream multiscales schema compatibility (non-blocking)
        run: task compliance:check:multiscales

  geo-proj-compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Validate geo-proj schema compliance
        run: task compliance:check:geo-proj

  spatial-compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Validate spatial schema compliance
        run: task compliance:check:spatial

  eopf-explorer-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Validate EOPF Explorer profile compatibility
        run: task compliance:check:eopf-explorer
