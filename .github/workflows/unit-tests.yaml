name: unit-tests

on:
  pull_request:
    paths:
      - "command-line-tools/**"
      - ".github/workflows/unit-tests.yaml"
      - "Taskfile.yml"
      - "uv.lock"
      - "**/pyproject.toml"
      - "**/uv.lock"
  push:
    branches:
      - develop
      - main
    paths:
      - "command-line-tools/**"
      - ".github/workflows/unit-tests.yaml"
      - "Taskfile.yml"
      - "uv.lock"
      - "**/pyproject.toml"
      - "**/uv.lock"
  workflow_dispatch:

jobs:
  scoped-unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package-dir:
          - command-line-tools/stac-zarr
          - command-line-tools/stac-collection
          - command-line-tools/stac-eopf-product

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Run unit tests
        working-directory: ${{ matrix.package-dir }}
        run: uv run --with pytest --with-editable . pytest -q tests
