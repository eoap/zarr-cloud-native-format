name: docs
on:
  push:
    branches:
      - develop
      - main
      - feature-stac-api
    paths:
      # Only rebuild website when docs have changed
      - 'docs/**'
      - 'mkdocs.yml'
      - .github/workflows/docs.yaml
      - cwl-workflow/app-*.cwl

jobs:

  version:
  
    runs-on: ubuntu-latest

    outputs:
      app-version: ${{ steps.set-version.outputs.version }}

    steps:
    - uses: actions/checkout@v2
    - run: echo "APP_VERSION=$(cat codemeta.json | jq -r .version )" >> $GITHUB_ENV
    - run: echo app version is $APP_VERSION
    - id: set-version
      run: echo "::set-output name=version::$APP_VERSION"

  deploy:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v2

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Start Docker Daemon
        run: |
          sudo systemctl start docker

      - name: Set up Python 3.x
        uses: actions/setup-python@v2
        with:
          python-version: 3.x
      - run: pip install mkdocs-material mkdocs-mermaid2-plugin mkdocs-jupyter odc-stac ipykernel cwltool zarr matplotlib graphviz pillow "cwl-loader>=0.5.0" eoap-cwlwrap plantuml "cwl2puml>=0.8.0"
      - run: sudo apt update && sudo apt install -y graphviz wget
      
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      
      - run: |
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              app_image_tag="${GITHUB_REF_NAME#v}"
            elif [ "${GITHUB_REF_NAME}" = "main" ]; then
              app_image_tag="latest"
            elif [ "${GITHUB_REF_NAME}" = "develop" ]; then
              app_image_tag="latest-dev"
            else
              app_image_tag="latest-dev"
            fi

            echo "Resolved app image tag: ${app_image_tag}"

            for step in crop norm_diff otsu stac-zarr stac-collection stac-eopf-product
            do
              # if step in stac-zarr, stac-collection, stac-eopf-product, pull from eoap/zarr-cloud-native-format
              if [ "$step" = "stac-zarr" ] || [ "$step" = "stac-collection" ] || [ "$step" = "stac-eopf-product" ]; then
                tag="ghcr.io/eoap/zarr-cloud-native-format/${step}:${app_image_tag}"
                fallback_tag="ghcr.io/eoap/zarr-cloud-native-format/${step}:latest"
              else
                upstream_version="1.1.0"
                tag="ghcr.io/eoap/mastering-app-package/${step}:${upstream_version}"
                fallback_tag=""
              fi
              echo "Pulling ${tag}"
              if ! docker pull "${tag}"; then
                if [ -n "${fallback_tag}" ]; then
                  echo "Tag not found, falling back to ${fallback_tag}"
                  docker pull "${fallback_tag}"
                else
                  exit 1
                fi
              fi
            done

            mkdocs gh-deploy --force
